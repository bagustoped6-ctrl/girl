<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Live Sports Streaming - Watch Live HD">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}

        body{
            font-family:Arial,sans-serif;
            color:#fff;
            text-align:center;
            background:
                linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.92)),
                url('realistic-neon-lights-background_52683-60202.webp');
            background-size:cover;
            background-position:center;
            min-height:100vh;
            display:flex;
            flex-direction:column;
        }

        .banner-top{
            width:100%;display:flex;justify-content:center;align-items:center;
            padding:8px 0;background:rgba(0,0,0,0.5);flex-shrink:0;
        }

        .container{
            flex:1;width:100%;padding:18px 16px 24px;
            display:flex;flex-direction:column;align-items:center;
        }

        .live-badge{
            background:linear-gradient(45deg,#ff0000,#ff3c3c);
            padding:9px 20px;border-radius:40px;font-weight:bold;
            letter-spacing:1px;display:inline-block;margin-bottom:10px;
            box-shadow:0 0 18px rgba(255,0,0,0.8);animation:blink 1s infinite;
            color:#fff;text-decoration:none;
        }

        @keyframes blink{0%{opacity:1;}50%{opacity:0.6;}100%{opacity:1;}}

        h1{font-size:36px;margin-bottom:6px;text-shadow:0 0 15px rgba(255,255,255,0.35);}
        .sub-text{color:#ddd;font-size:16px;margin-bottom:8px;}

        .viewer-bar{
            display:inline-flex;align-items:center;gap:7px;
            background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
            border-radius:30px;padding:6px 16px;font-size:13px;color:#aaffaa;margin-bottom:8px;
        }

        .viewer-dot{
            width:8px;height:8px;border-radius:50%;background:#00ff88;
            box-shadow:0 0 6px #00ff88;animation:blink 1s infinite;flex-shrink:0;
        }

        .countdown-bar{
            background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
            border-radius:30px;padding:7px 20px;font-size:14px;color:#ffd700;
            margin-bottom:14px;display:inline-block;
        }

        .player-box{
            position:relative;width:92%;max-width:680px;margin:0 auto;
            border-radius:18px;overflow:hidden;
            box-shadow:0 0 30px rgba(255,0,0,0.55), 0 0 80px rgba(255,0,0,0.25);
            aspect-ratio:16/9;background:#000;
        }

        .player-thumb{
            position:absolute;inset:0;z-index:1;
        }

        .player-thumb img{
            width:100%;height:100%;object-fit:cover;display:block;
        }

        .player-overlay{
            position:absolute;inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.5), rgba(0,0,0,0.1));
            z-index:2;
        }

        .unlock-btn{
            position:absolute;top:50%;left:50%;
            transform:translate(-50%,-50%);
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            gap:8px;
            background:linear-gradient(135deg,#ff0000,#ff6a00,#ffcc00);
            border-radius:16px;
            padding:18px 32px;
            cursor:pointer;
            z-index:3;
            box-shadow:0 0 30px rgba(255,100,0,0.85), 0 0 70px rgba(255,200,0,0.45);
            animation:unlockPulse 1.5s infinite;
            border:2px solid rgba(255,255,255,0.35);
            text-decoration:none;
        }

        .unlock-icon{
            font-size:38px;
            filter:drop-shadow(0 0 10px rgba(255,255,255,0.95));
        }

        .unlock-text{
            font-size:20px;
            font-weight:900;
            color:#fff;
            letter-spacing:2.5px;
            text-shadow:0 0 14px rgba(255,255,100,0.95), 0 2px 4px rgba(0,0,0,0.6);
            white-space:nowrap;
        }

        @keyframes unlockPulse{
            0%  {transform:translate(-50%,-50%) scale(1);   box-shadow:0 0 20px rgba(255,100,0,0.7),0 0 50px rgba(255,200,0,0.3);}
            50% {transform:translate(-50%,-50%) scale(1.08);box-shadow:0 0 55px rgba(255,200,0,1),  0 0 100px rgba(255,50,0,0.6);}
            100%{transform:translate(-50%,-50%) scale(1);   box-shadow:0 0 20px rgba(255,100,0,0.7),0 0 50px rgba(255,200,0,0.3);}
        }

        .stream-ready{
            position:absolute;inset:0;z-index:4;
            display:none;flex-direction:column;align-items:center;justify-content:center;
            background:rgba(0,0,0,0.65);
            backdrop-filter:blur(3px);
            border-radius:18px;padding:24px;
        }

        .stream-ready.active{display:flex;}

        .stream-title{
            font-size:22px;font-weight:bold;color:#00ff88;
            margin-bottom:6px;text-shadow:0 0 10px rgba(0,255,136,0.7);
        }

        .stream-sub{font-size:14px;color:#ccc;margin-bottom:20px;}

        .loading-bar-wrap{
            width:80%;background:rgba(255,255,255,0.15);
            border-radius:30px;height:14px;overflow:hidden;
            margin-bottom:12px;border:1px solid rgba(255,255,255,0.2);
        }

        .loading-bar-fill{
            height:100%;width:0%;border-radius:30px;
            background:linear-gradient(90deg, #00ff88, #00cfff);
            box-shadow:0 0 10px rgba(0,255,136,0.6);
            transition:width 0.5s ease;
        }

        .loading-text{font-size:14px;color:#ffd700;}

        .desc{margin-top:14px;color:#ddd;font-size:16px;}

        .cta-btn{
            display:inline-block;margin-top:16px;padding:16px 36px;
            font-size:18px;font-weight:bold;color:#fff;text-decoration:none;
            border-radius:60px;background:linear-gradient(45deg, #ff0000, #ff6a00);
            box-shadow:0 0 20px rgba(255,0,0,0.75), 0 0 50px rgba(255,80,0,0.45);
            animation:pulseBtn 1.3s infinite;
        }

        @keyframes pulseBtn{
            0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}
        }

        @media(max-width:768px){
            h1{font-size:26px;}
            .unlock-btn{padding:14px 22px;}
            .unlock-text{font-size:15px;letter-spacing:1.5px;}
            .unlock-icon{font-size:28px;}
            .cta-btn{font-size:16px;padding:14px 28px;}
            .stream-title{font-size:18px;}
        }
    </style>
</head>

<body>

<!-- Banner Atas -->
<div class="banner-top">
    <script>
      atOptions = {
        'key' : 'b25f25b0bebbcab9e05cd87e0e64b586',
        'format' : 'iframe',
        'height' : 90,
        'width' : 728,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/b25f25b0bebbcab9e05cd87e0e64b586/invoke.js"></script>
</div>

<div class="container">

    <a class="live-badge" id="liveBadge" href="#" target="_blank">🔴 LIVE NOW</a>

    <h1 id="mainTitle">Watch Live HD Sports</h1>
    <p class="sub-text" id="subText">Premium Live Streaming • No Buffer • HD Quality</p>

    <div class="viewer-bar">
        <span class="viewer-dot"></span>
        <span id="viewerCount">1,024</span>&nbsp;<span id="watchingText">watching now</span>
    </div>

    <div class="countdown-bar" id="countdownBar">⏱ <span id="countdownLabel">Stream opens in</span> <span id="timer">15</span>s...</div>

    <div class="player-box">
        <div class="player-thumb">
            <img src="Screenshot_736.webp" alt="Live Sports">
        </div>
        <div class="player-overlay"></div>

        <div class="unlock-btn" id="playBtn" onclick="handlePlay()">
            <span class="unlock-icon">🔓</span>
            <span class="unlock-text" id="unlockText">UNLOCK ALL VIDEOS</span>
        </div>

        <div class="stream-ready" id="streamReady">
            <div class="stream-title" id="streamTitle">✅ Your Stream is Ready!</div>
            <div class="stream-sub" id="streamSub">Connecting to live server...</div>
            <div class="loading-bar-wrap">
                <div class="loading-bar-fill" id="loadingFill"></div>
            </div>
            <div class="loading-text"><span id="redirectLabel">Redirecting in</span> <span id="loadTimer">15</span>s...</div>
        </div>
    </div>

    <p class="desc" id="descText">Watch unlimited live sports streams instantly.</p>

    <a class="cta-btn" id="ctaBtn" href="#" target="_blank">▶ WATCH LIVE NOW</a>

</div>

<script>
    const SMARTLINK = 'https://www.effectivecpmnetwork.com/p0b7w66uy?key=1755f3331849711f11b784c127e4a493';

    // ── Multi-bahasa ──────────────────────────────────────────────
    const LANG = {
        SE: {
            title:       'Se Live HD-Sport',
            sub:         'Premium Streaming • Ingen Buffring • HD-kvalitet',
            unlock:      '🔓 LÅS UPP ALLA VIDEOS',
            watching:    'tittar nu',
            opens:       'Stream öppnas om',
            badge:       '🔴 LIVE NU',
            streamTitle: '✅ Din stream är redo!',
            streamSub:   'Ansluter till live-server...',
            redirect:    'Omdirigerar om',
            desc:        'Se obegränsat med livesport direkt.',
            cta:         '▶ SE LIVE NU',
        },
        DE: {
            title:       'Live HD-Sport ansehen',
            sub:         'Premium-Streaming • Kein Puffern • HD-Qualität',
            unlock:      '🔓 ALLE VIDEOS FREISCHALTEN',
            watching:    'schauen jetzt',
            opens:       'Stream öffnet in',
            badge:       '🔴 LIVE JETZT',
            streamTitle: '✅ Dein Stream ist bereit!',
            streamSub:   'Verbindung zum Live-Server...',
            redirect:    'Weiterleitung in',
            desc:        'Unbegrenzt Live-Sport sofort ansehen.',
            cta:         '▶ JETZT LIVE ANSEHEN',
        },
        CA: {
            title:       'Regarder le Sport en Direct HD',
            sub:         'Streaming Premium • Sans Tampon • Qualité HD',
            unlock:      '🔓 DÉBLOQUER TOUTES LES VIDÉOS',
            watching:    'regardent maintenant',
            opens:       'Stream ouvre dans',
            badge:       '🔴 EN DIRECT',
            streamTitle: '✅ Votre stream est prêt !',
            streamSub:   'Connexion au serveur live...',
            redirect:    'Redirection dans',
            desc:        'Regardez des sports en direct illimités.',
            cta:         '▶ REGARDER EN DIRECT',
        },
        JP: {
            title:       'ライブHDスポーツを観る',
            sub:         'プレミアム配信 • バッファなし • HD画質',
            unlock:      '🔓 全動画を解除する',
            watching:    '人が視聴中',
            opens:       'ストリーム開始まで',
            badge:       '🔴 ライブ中',
            streamTitle: '✅ ストリームの準備ができました！',
            streamSub:   'ライブサーバーに接続中...',
            redirect:    'リダイレクトまで',
            desc:        '無制限のライブスポーツをすぐに視聴。',
            cta:         '▶ 今すぐ視聴',
        },
        EN: {
            title:       'Watch Live HD Sports',
            sub:         'Premium Live Streaming • No Buffer • HD Quality',
            unlock:      '🔓 UNLOCK ALL VIDEOS',
            watching:    'watching now',
            opens:       'Stream opens in',
            badge:       '🔴 LIVE NOW',
            streamTitle: '✅ Your Stream is Ready!',
            streamSub:   'Connecting to live server...',
            redirect:    'Redirecting in',
            desc:        'Watch unlimited live sports streams instantly.',
            cta:         '▶ WATCH LIVE NOW',
        }
    };

    // Deteksi negara dari browser language
    const rawLang = navigator.language || navigator.userLanguage || 'en';
    const countryCode = rawLang.split('-')[1]?.toUpperCase() || rawLang.toUpperCase();
    const T = LANG[countryCode] || LANG['EN'];

    // Terapkan teks
    document.getElementById('mainTitle').textContent    = T.title;
    document.getElementById('subText').textContent      = T.sub;
    document.getElementById('unlockText').textContent   = T.unlock;
    document.getElementById('watchingText').textContent = T.watching;
    document.getElementById('countdownLabel').textContent = T.opens;
    document.getElementById('liveBadge').textContent    = T.badge;
    document.getElementById('streamTitle').textContent  = T.streamTitle;
    document.getElementById('streamSub').textContent    = T.streamSub;
    document.getElementById('redirectLabel').textContent = T.redirect;
    document.getElementById('descText').textContent     = T.desc;
    document.getElementById('ctaBtn').textContent       = T.cta;

    // Set semua link ke smartlink
    document.getElementById('liveBadge').href = SMARTLINK;
    document.getElementById('ctaBtn').href    = SMARTLINK;

    // ── State timer global (biar gak race condition) ──────────────
    let redirected = false;
    let countdown  = null;
    let unlockTimer = null;
    let viewerInterval = null;

    function goToSmartlink() {
        if (redirected) return; // cegah double-fire kalau dua timer kebetulan barengan
        redirected = true;
        if (countdown)      clearInterval(countdown);
        if (unlockTimer)    clearInterval(unlockTimer);
        if (viewerInterval) clearInterval(viewerInterval);
        window.location.href = SMARTLINK;
    }

    // ── Handle Play (klik tombol unlock) ─────────────────────────
    function handlePlay() {
        // matikan countdown awal supaya gak race sama timer unlock
        if (countdown) clearInterval(countdown);

        document.getElementById('playBtn').style.display = 'none';
        document.getElementById('streamReady').classList.add('active');

        let secs = 15;
        const loadTimerEl = document.getElementById('loadTimer');
        const fillEl      = document.getElementById('loadingFill');

        unlockTimer = setInterval(() => {
            secs--;
            loadTimerEl.textContent = secs;
            fillEl.style.width = ((15 - secs) / 15 * 100) + '%';
            if (secs <= 0) {
                clearInterval(unlockTimer);
                goToSmartlink();
            }
        }, 1000);
    }

    // ── Countdown bar auto-redirect ───────────────────────────────
    let seconds = 15;
    const timerEl      = document.getElementById('timer');
    const countdownBar = document.getElementById('countdownBar');

    countdown = setInterval(() => {
        seconds--;
        timerEl.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(countdown);
            countdownBar.innerHTML = '✅ Stream opened! Enjoy watching 🎉';
            goToSmartlink();
        }
    }, 1000);

    // ── Viewer count animasi ──────────────────────────────────────
    let viewers = 1024;
    const viewerEl = document.getElementById('viewerCount');
    viewerEl.textContent = viewers.toLocaleString('en-US');

    viewerInterval = setInterval(() => {
        const delta = Math.floor(Math.random() * 21) - 8;
        viewers = Math.max(980, viewers + delta);
        viewerEl.textContent = viewers.toLocaleString('en-US');
    }, 3000);
</script>

</body>
</html>
